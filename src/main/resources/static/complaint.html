<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Complaint Router</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        body {
            background-color: #dbe7f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            padding: 30px;
            width: 450px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0d6efd;
        }

        button {
            width: 100%;
        }

        #result {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Submit Complaint</h2>

    <form id="complaintForm">
    
    		<select id="category" class="form-select mb-3" required>
    			<option value="">Select Complaint Subject</option>
		</select>

        <textarea id="description"
            class="form-control mb-3"
            placeholder="Complaint description"
            required></textarea>

        <input type="file"
            id="image"
            accept="/image*"
            class="form-control mb-3"
            placeholder="Image URL (optional)">

        <!-- CATEGORY (temporary default until dropdown added) -->
        <input type="hidden" id="categoryId" value="1">

        <button type="submit" class="btn btn-primary">
            Submit Complaint
        </button>
    </form>

    <p id="result"></p>

    <button class="btn btn-link p-0 mt-2"
        onclick="window.location.href='my-complaints.html'">
        View My Complaints
    </button>
</div>

<script>

/* ================= AUTH CHECK ================= */

let user = null;

(function () {

    const storedUser = localStorage.getItem("user");

    // not logged in
    if (!storedUser) {
        alert("Session expired. Please login again.");
        window.location.replace("login.html");
        return;
    }

    // safe JSON parse
    try {
        user = JSON.parse(storedUser);
    } catch (e) {
        console.error("Invalid user data");
        localStorage.clear();
        alert("Invalid session. Please login again.");
        window.location.replace("login.html");
        return;
    }

    console.log("Loaded user:", user);

    // validate session token FIRST
    if (!user.sessionToken) {
        localStorage.clear();
        alert("Session expired. Please login again.");
        window.location.replace("login.html");
        return;
    }

    // block admin access
    if (user.role && user.role.toUpperCase() === "ADMIN") {
        alert("Admins cannot submit complaints");
        window.location.replace("admin.html");
        return;
    }

})();

/* ================= LOAD CATEGORIES ================= */

fetch("http://localhost:8086/api/categories/active")
.then(res => {
    if (!res.ok) throw new Error("Failed to load categories");
    return res.json();
})
.then(categories => {

    const dropdown = document.getElementById("category");

    dropdown.length = 1; // keep placeholder

    categories.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.id;
        option.textContent = cat.name;
        dropdown.appendChild(option);
    });
})
.catch(err => {
    console.error("Failed to load categories", err);
});


/* ================= SUBMIT COMPLAINT ================= */

document.getElementById("complaintForm")
.addEventListener("submit", async function (e) {

    e.preventDefault();

    const resultEl = document.getElementById("result");
    resultEl.style.color = "black";
    resultEl.innerText = "Submitting...";

    try {

        const formData = new FormData();

        const description =
            document.getElementById("description").value.trim();

        const categoryId =
            document.getElementById("category").value;

        const imageFile =
            document.getElementById("image").files[0];

        if (!description) {
            resultEl.style.color = "red";
            resultEl.innerText = "Description is required";
            return;
        }

        formData.append("description", description);
        formData.append("categoryId", categoryId);

        if (imageFile) {
            formData.append("image", imageFile);
        }

        const response = await fetch(
            "http://localhost:8086/api/complaints/submit",
            {
                method: "POST",
                headers: {
                    "X-SESSION-TOKEN": user.sessionToken
                },
                body: formData
            }
        );

        // show backend errors
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        const data = await response.json();

        resultEl.style.color = "green";
        resultEl.innerText =
            "Complaint submitted successfully. ID: " + data.id;

        document.getElementById("complaintForm").reset();

    } catch (err) {

        console.error("Submission error:", err);

        resultEl.style.color = "red";
        resultEl.innerText =
            "Submission failed: " + err.message;
    }
});
</script>


</body>
</html>
