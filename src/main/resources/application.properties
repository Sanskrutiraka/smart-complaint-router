# ================= APPLICATION =================
spring.application.name=SmartComplaintRouter
server.port=8086


# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/complaint_db
spring.datasource.username=root
spring.datasource.password=root


# ================= JPA / HIBERNATE =================
# update keeps schema synced without deleting data
spring.jpa.hibernate.ddl-auto=update

# production-style logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# prevents lazy loading issues during view rendering
spring.jpa.open-in-view=false


# ================= CONNECTION POOL (HIKARI) =================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000


# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ================= ERROR HANDLING (VERY IMPORTANT) =================
# prevents raw JSON errors shown to users
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never